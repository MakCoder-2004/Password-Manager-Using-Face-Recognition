<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: file: http: https:;" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Face Vault</title>
  </head>
  <body>
    <div id="root">
      <style>
        body { background: #050508; margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        .boot-logo { width: 80px; height: 80px; border: 1px solid rgba(124, 58, 237, 0.3); border-radius: 50%; display: flex; align-items: center; justify-content: center; position: relative; animation: boot-pulse 2s infinite ease-in-out; }
        .boot-logo::after { content: ""; position: absolute; inset: -10px; border: 1px solid #7c3aed; border-radius: 50%; animation: boot-ping 2s infinite cubic-bezier(0, 0, 0.2, 1); opacity: 0; }
        @keyframes boot-pulse { 0%, 100% { transform: scale(1); opacity: 0.5; } 50% { transform: scale(1.05); opacity: 0.8; } }
        @keyframes boot-ping { 0% { transform: scale(1); opacity: 0.5; } 100% { transform: scale(1.5); opacity: 0; } }
      </style>
      <div class="boot-logo">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#7c3aed" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path></svg>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
